services:
  - type: web
    name: noda-pics
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r api/requirements.txt
    startCommand: cd api && gunicorn -w 2 -b 0.0.0.0:$PORT app:app
    healthCheckPath: /health
    envVars:
      - key: DB_HOST
        value: YOUR_DB_HOST
      - key: DB_PORT
        value: 3306
      - key: DB_USER
        value: noda_pics
      - key: DB_PASS
        value: "REDACTED_DB_PASS"
      - key: DB_NAME
        value: noda_pics
      - key: RATE_LIMIT
        value: 5
      - key: QUEUE_MAX
        value: 20
